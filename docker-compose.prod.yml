# Production stack — Caddy + PHP + SQLite
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      # App image does not COPY backend — PHP must see public/index.php + src/ on disk.
      - ./backend:/var/www/html:ro
      # Replaces the whole backend/database tree in the container (only volume contents exist
      # there). Bundled SQL for runtime schema fixes lives under backend/sql/ instead.
      - sqlite_data:/var/www/html/database
    # Load secrets from this file into the container. Do not use ${VAR} here — Compose
    # substitutes those from the *host* .env / shell only; it does not read .env.production,
    # so Google OAuth (and others) would stay empty unless you sourced the file manually.
    env_file:
      - .env.production

volumes:
  caddy_data:
  caddy_config:
  sqlite_data:
