# Host-level Apache vhost for Project Codex (Docker Caddy on 127.0.0.1:8082).
#
# Install (Debian/Ubuntu):
#   sudo cp deploy/apache/codex.nordinkole.nl.conf /etc/apache2/sites-available/
#   sudo a2enmod proxy proxy_http headers ssl
#   sudo a2ensite codex.nordinkole.nl.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Ensure docker-compose.prod.yml maps Caddy to 127.0.0.1:8082:80, then:
#   docker compose -f docker-compose.prod.yml up -d

<VirtualHost *:80>
    ServerName codex.nordinkole.nl

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName codex.nordinkole.nl

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/codex.nordinkole.nl/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/codex.nordinkole.nl/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:8082/
    ProxyPassReverse / http://127.0.0.1:8082/

    ErrorLog ${APACHE_LOG_DIR}/codex-error.log
    CustomLog ${APACHE_LOG_DIR}/codex-access.log combined
</VirtualHost>
